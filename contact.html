<style>
    /* Reset some default styles */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body styling */
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #2f1e20, #38149c);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* contact-info */
.contact-info {
    margin-top: 40px;
    padding: 16px;
}
.contact-info .divider {
    width: 300%;
    height: 2px;
    margin: 0 auto 12px;
    background: rgba(255,255,255,0.25);
}

/* Contact container */
.contact-container {
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    width: 90%;
    max-width:1000px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* Heading */
.contact-container h2 {
    margin-bottom: 20px;
    font-size: 100px;
    font-weight: bold;
    color: #eceaea;
}

/* Contact text */
.contact-info {
    font-size: 18px;
    font-weight: bold;
    color: #f8f8f8;
    margin-bottom: 15px;
}

/* Links (email, phone, etc.) */
.contact-info a {
    color: #a14ffe;
    text-decoration: none;
    font-weight: bold;
}

.contact-info a:hover {
    text-decoration: underline;
}
